<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1d4f91">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Horas Extras">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Horas Extras</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <img src="" data-logo alt="Logo" class="logo">
      <h1>Horas Extras</h1>
      <p class="subtitulo">Ingresa tus credenciales</p>
      <div class="form-login">
        <input type="text" id="codigo" placeholder="Codigo" inputmode="numeric" autocomplete="username">
        <input type="password" id="clave" placeholder="Contrasena" autocomplete="current-password">
        <button class="btn-ingresar" id="btnLogin" onclick="login()">Ingresar</button>
      </div>
      <p id="errorMsg" class="error-msg" style="display:none">Codigo o contrasena incorrectos</p>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    document.getElementById('clave').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });

    function login() {
      var codigo = document.getElementById('codigo').value.trim();
      var clave  = document.getElementById('clave').value.trim();
      var btn    = document.getElementById('btnLogin');
      var err    = document.getElementById('errorMsg');

      if (!codigo || !clave) {
        err.style.display = 'block';
        err.textContent = 'Completa ambos campos';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      err.style.display = 'none';

      gasCall('login', { codigo: codigo, clave: clave }).then(function(res) {
        if (res.ok) {
          localStorage.setItem('nombreUsuario', res.usuario.nombre);
          localStorage.setItem('rolUsuario',    res.usuario.rol);
          localStorage.setItem('codigoUsuario', res.usuario.codigo);
          localStorage.setItem('esAdmin',       res.usuario.rol === 'Admin' ? 'si' : 'no');
          window.location.href = res.usuario.rol === 'Admin' ? 'admin.html' : 'trabajador.html';
        } else {
          err.style.display = 'block';
          err.textContent = 'Codigo o contrasena incorrectos';
          btn.disabled = false;
          btn.textContent = 'Ingresar';
        }
      });
    }
  </script>
  <script src="logo.js"></script>
</body>
</html>
