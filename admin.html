<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator)
    navigator.serviceWorker.register('./sw.js');
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrador</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="panel">

    <div class="top-bar">
      <h1>Solicitudes Pendientes</h1>

      <div class="top-right">
        <div class="logo-container">
          <img src="assets/Escudo1.jpg" alt="Logo" class="logo-top">
        </div>
        <button class="btn-resumen" onclick="mostrarResumen()">Ver Resumen</button>
        <button class="cerrar-btn" onclick="cerrarSesion()">Cerrar Sesion</button>
      </div>
    </div>

    <div id="contenedorSolicitudes"></div>

  </div>

  <!-- Modal Resumen -->
  <div id="modalResumen" class="modal-overlay oculto" onclick="cerrarResumenFuera(event)">
    <div class="modal-resumen">
      <div class="modal-header">
        <h2>Resumen del Mes</h2>
        <button class="btn-cerrar-modal" onclick="cerrarResumen()">&#x2715;</button>
      </div>
      <div id="listaResumen"></div>
    </div>
  </div>

  <script src="js/admin.js"></script>

  <script>
    function cerrarSesion() {
      localStorage.clear();
      window.location.replace('./index.html');
    }

    function cerrarResumenFuera(event) {
      if (event.target === document.getElementById('modalResumen')) {
        cerrarResumen();
      }
    }
  </script>

</body>
</html>
